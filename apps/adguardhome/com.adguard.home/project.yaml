# ============================================================
# AdGuard Home — UGOS Pro 原生应用配置
# 基于 AdguardTeam/AdGuardHome 官方静态编译二进制 (自带 WebUI)
# 管理界面端口固定 3000 (start.sh 用 --web-addr 钉死)
# ============================================================

# 配置规范版本
spec_version: "2.1"

# 应用ID（上架后不可修改）
app_id: com.adguard.home

# 应用版本号 x.y.z（打包时 --build 追加构建号）
version: 0.999.1

# 支持的 CPU 架构
support_arch:
  - amd64
  - arm64

# 支持的客户端类型
supports:
  - pc
  - app

# 启动命令：调用封装脚本（准备数据目录后拉起 AdGuardHome 并守护）
start_cmd: bin/start.sh

# WebUI 服务端口（由 start.sh 通过 --web-addr 固定为 3000，供系统探测启动状态；
# 即使在 AdGuard Home 后台修改 Web 端口也不会生效，应用图标始终可打开管理页）
port: 3000

# 打开方式：AdGuard Home 自带完整 WebUI，浏览器新标签直连
open_type: tab

# 应用类别
tag_types:
  - utility

# 依赖的最低固件版本
depend_fw_version: 1.13.0.0000

# 支持迁移安装目录
support_migration: true

# 声明权限：DNS 解析/下载过滤规则必须联网；启动脚本需 fork 子进程
permissions:
  - NETWORK.ACCESS_INTERNET
  - SYSTEM.EXEC_SYSTEM_COMMAND

# 开源合规信息（使用开源代码必填）
license_agreement_link:
  - https://github.com/AdguardTeam/AdGuardHome/blob/master/LICENSE.txt
source_code_link:
  - https://github.com/AdguardTeam/AdGuardHome
technical_support_link:
  - https://github.com/AdguardTeam/AdGuardHome/issues

# 应用展示信息（多语言）
i18n:
  en-US:
    name: AdGuard Home
    description: >-
      AdGuard Home — network-wide ads & trackers blocking DNS server.
      Covers ALL your home devices without any client-side software.
      Open the app to run the first-time setup wizard and create your
      admin account. IMPORTANT: this app runs as a non-root user and
      cannot bind ports below 1024 — in the setup wizard, set the DNS
      listen port to a value >= 1024 (e.g. 5353), then point your
      router/clients to NAS_IP:5353 (routers that support a custom DNS
      port, e.g. OpenWrt) or forward port 53 to it on your router.
      The admin web UI is fixed on port 3000.
    author: AdGuard
    official: https://adguard.com/adguard-home/overview.html
    help: https://github.com/AdguardTeam/AdGuardHome/wiki
    publisher: AdGuard
    publisher_link: https://github.com/AdguardTeam
  zh-CN:
    name: AdGuard Home
    description: >-
      AdGuard Home —— 全网络广告与跟踪器拦截 DNS 服务器，无需在每台设备上
      安装客户端即可保护家中所有设备。首次打开应用会进入初始化向导，
      请在向导中创建管理员账号。重要提示：应用以普通用户运行，无法监听
      1024 以下端口——请在向导中把 DNS 监听端口设为 1024 以上（如 5353），
      然后在支持自定义 DNS 端口的路由器（如 OpenWrt/爱快）上填 NAS_IP#5353，
      或在路由器上把 53 端口转发到该端口。管理界面固定在 3000 端口，
      请勿依赖后台里的 Web 端口设置（不会生效）。升级请通过应用中心安装
      新版本，应用内自升级已禁用。
    author: AdGuard
    official: https://adguard.com/zh_cn/adguard-home/overview.html
    help: https://github.com/AdguardTeam/AdGuardHome/wiki
    publisher: AdGuard
    publisher_link: https://github.com/AdguardTeam
