# ============================================================
# SmartDNS — UGOS Pro 原生应用配置
# 基于 pymumu/smartdns 官方 linux-all 发行包（musl 自包含二进制 +
# smartdns_ui.so Web 管理界面插件，UI 端口 6080）
# ============================================================

# 配置规范版本
spec_version: "2.1"

# 应用ID（上架后不可修改）
app_id: com.pymumu.smartdns

# 应用版本号 x.y.z（CI 会用上游版本替换本行；打包时 --build 追加构建号）
version: 48.2.0

# 支持的 CPU 架构
support_arch:
  - amd64
  - arm64

# 支持的客户端类型
supports:
  - pc
  - app

# 启动命令：封装脚本（生成配置 + 守护循环，见 scripts/apps/smartdns/static/start.sh）
start_cmd: bin/start.sh

# Web 管理界面端口（smartdns-ui 插件，供系统探测启动状态；
# 请勿在配置里修改此端口，否则应用图标将打不开管理页）
port: 6080

# 打开方式：smartdns-ui 自带完整 WebUI，浏览器新标签直连
open_type: tab

# 应用类别
tag_types:
  - utility

# 依赖的最低固件版本
depend_fw_version: 1.13.0.0000

# 支持迁移安装目录（start.sh 每次启动按实际路径重新生成 runtime.conf）
support_migration: true

# 声明权限：DNS 上游查询/测速必须联网；启动脚本需 fork smartdns 子进程
permissions:
  - NETWORK.ACCESS_INTERNET
  - SYSTEM.EXEC_SYSTEM_COMMAND

# 开源合规信息（使用开源代码必填，GPL-3.0）
license_agreement_link:
  - https://github.com/pymumu/smartdns/blob/master/LICENSE
source_code_link:
  - https://github.com/pymumu/smartdns
technical_support_link:
  - https://github.com/pymumu/smartdns/issues

# 应用展示信息（多语言）
i18n:
  en-US:
    name: SmartDNS
    description: >-
      SmartDNS — a local DNS server that queries multiple upstream servers
      concurrently and returns the fastest IP, with DoT/DoH/DoQ upstream
      support, ad-blocking rules, dual-stack IP selection and a built-in
      web dashboard (default login: admin / password — change it after
      first login). Note: the app runs as a non-root user and cannot bind
      port 53; DNS listens on port 8653 (UDP+TCP) instead — point your
      router/clients at NAS_IP:8653 (dnsmasq: server=NAS_IP#8653). Config
      file: conf/smartdns.conf under the app data directory; restart the
      app to apply changes.
    author: pymumu
    official: https://pymumu.github.io/smartdns/
    help: https://pymumu.github.io/smartdns/
    publisher: pymumu
    publisher_link: https://github.com/pymumu
  zh-CN:
    name: SmartDNS
    description: >-
      SmartDNS —— 本地 DNS 服务器：并发查询多个上游并返回访问速度最快的 IP，
      支持 DoT/DoH/DoQ 加密上游、广告拦截规则、双栈 IP 优选、测速优选，
      自带 Web 管理界面（默认账号 admin，密码 password，首次登录后请及时修改）。
      注意：应用以普通用户运行，无法监听 53 端口，DNS 默认监听 8653 端口
      (UDP+TCP)——请在路由器或客户端把 DNS 指向 NAS的IP:8653
      （OpenWrt/dnsmasq 写法：server=NAS的IP#8653）。配置文件在应用数据目录的
      conf/smartdns.conf，修改后重启应用生效；请勿修改管理界面端口(6080)。
    author: pymumu
    official: https://pymumu.github.io/smartdns/
    help: https://pymumu.github.io/smartdns/
    publisher: pymumu
    publisher_link: https://github.com/pymumu
