# ============================================================
# Jellyfin Media Server — UGOS Pro 原生应用配置
# 自包含 .NET 运行时 (server 10.11.11) + 自定义 jellyfin-ffmpeg 7.1.4-3
# ============================================================

spec_version: "2.1"
app_id: com.jellyfin.server
version: 10.11.11

support_arch:
  - amd64
  - arm64

supports:
  - pc
  - app
  - tv

# 启动脚本(首段须存在于 rootfs_<arch>/bin/ 下)
start_cmd: bin/start.sh

# Web 服务端口(须与 start.sh 中 WEBUI_PORT / network.xml 一致, 供系统探活)
port: 8096

# 打开方式: Jellyfin 自带完整 Web 界面, 浏览器新标签直连
open_type: tab

# 应用类别
tag_types:
  - media

# 最低固件版本(占位值, 正式上架前请联系绿联开发确认真实版本号)
depend_fw_version: 1.13.0.0000

# 允许用户授权访问共享/个人文件夹(用作媒体库目录, 可授权多个)
allow_add_access_path: true

# 支持迁移安装目录
support_migration: true

# 权限: 刮削/远程访问需联网; 启动脚本执行系统命令; 硬件加速需访问设备(见说明)
permissions:
  - NETWORK.ACCESS_INTERNET
  - SYSTEM.EXEC_SYSTEM_COMMAND

# 开源合规(GPL-2.0)
license_agreement_link:
  - https://github.com/jellyfin/jellyfin/blob/master/LICENSE
source_code_link:
  - https://github.com/jellyfin/jellyfin
  - https://github.com/jellyfin/jellyfin-ffmpeg
technical_support_link:
  - https://jellyfin.org/docs/

i18n:
  en-US:
    name: Jellyfin
    description: >-
      Jellyfin is the free software media system that lets you manage and stream
      your movies, TV shows, music and photos. Bundled with a self-contained .NET
      runtime and custom jellyfin-ffmpeg (with hardware acceleration support).
    author: Jellyfin Project
    official: https://jellyfin.org
    help: https://jellyfin.org/docs/
    publisher: Jellyfin Project
    publisher_link: https://jellyfin.org
  zh-CN:
    name: Jellyfin 媒体服务器
    description: >-
      Jellyfin 是免费开源的多媒体管理与串流系统，可管理并串流你的电影、剧集、音乐与照片。
      内置自包含 .NET 运行时与自定义 jellyfin-ffmpeg（支持硬件加速）。
    author: Jellyfin Project
    official: https://jellyfin.org
    help: https://jellyfin.org/docs/
    publisher: Jellyfin Project
    publisher_link: https://jellyfin.org
