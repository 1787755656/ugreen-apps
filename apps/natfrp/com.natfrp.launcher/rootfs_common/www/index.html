<body style="font-family:sans-serif;max-width:640px;margin:40px auto;padding:0 20px;color:#333">
<h2>SakuraFrp 启动器</h2>
<p>樱花 FRP 内网穿透客户端。点击应用图标将在浏览器新标签页打开启动器自带的 Web UI 管理界面。</p>
<p>首次访问会提示证书不安全，这是正常的（启动器使用自签名 HTTPS 证书）。
请选择「高级 → 继续前往」信任证书后即可访问，默认密码 admin888。</p>
