name: Reusable UGOS Pro App Build

on:
  workflow_call:
    inputs:
      app:
        description: "App slug (must have apps/<app>/ and scripts/apps/<app>/meta.env)"
        required: true
        type: string
      version:
        description: "Override version (empty for latest)"
        required: false
        type: string
        default: ""
      revision:
        description: "Revision suffix, e.g. r2"
        required: false
        type: string
        default: ""
      event_name:
        description: "Original trigger event name"
        required: false
        type: string
        default: "workflow_dispatch"

permissions:
  contents: write
  actions: write

env:
  # Pinned so a new ugcli release doesn't silently change packaging
  # behavior for every app at once — bump deliberately when needed.
  UGCLI_VERSION: "1.1.0.13"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      project_version: ${{ steps.version.outputs.project_version }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
      should_build: ${{ steps.tag.outputs.should_build }}
      build_num: ${{ steps.tag.outputs.build_num }}
      project_dir: ${{ steps.meta.outputs.project_dir }}
      file_prefix: ${{ steps.meta.outputs.file_prefix }}
      release_title: ${{ steps.meta.outputs.release_title }}
      arch_matrix: ${{ steps.meta.outputs.arch_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate app input
        run: |
          APP="${{ inputs.app }}"
          if [ ! -d "apps/$APP" ]; then
            echo "::error::App '$APP' not found in apps/ directory"
            exit 1
          fi
          if [ ! -f "scripts/apps/$APP/meta.env" ]; then
            echo "::error::App '$APP' has no scripts/apps/$APP/meta.env build contract"
            exit 1
          fi

      - name: Resolve app metadata
        id: meta
        run: |
          APP="${{ inputs.app }}"
          source "scripts/apps/${APP}/meta.env"
          echo "project_dir=${PROJECT_DIR}" >> "$GITHUB_OUTPUT"
          echo "file_prefix=${FILE_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "release_title=${RELEASE_TITLE}" >> "$GITHUB_OUTPUT"
          ARCH_MATRIX=$(echo "${SUPPORTED_ARCH:-amd64 arm64}" | tr ' ' '\n' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "arch_matrix=${ARCH_MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Architectures: ${ARCH_MATRIX}"

      - name: Get latest version
        id: version
        run: bash "scripts/apps/${{ inputs.app }}/get-latest-version.sh" "${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag / build number
        id: tag
        run: |
          bash scripts/ci/resolve-release-tag.sh \
            "${{ inputs.app }}" \
            "${{ steps.version.outputs.version }}" \
            "${{ inputs.event_name }}" \
            "${{ inputs.revision }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: ${{ fromJson(needs.check-version.outputs.arch_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache ugcli
        id: ugcli-cache
        uses: actions/cache@v6
        with:
          path: /usr/local/bin/ugcli
          key: ugcli-linux-amd64-${{ env.UGCLI_VERSION }}

      - name: Download ugcli
        if: steps.ugcli-cache.outputs.cache-hit != 'true'
        run: |
          curl -fL -o /usr/local/bin/ugcli \
            "https://osswaf.ugnas.com/pro/ugcli/download/ugcli-v${UGCLI_VERSION}-linux-amd64"
          chmod +x /usr/local/bin/ugcli
          ugcli --version

      - name: Run app build.sh
        run: |
          bash "scripts/apps/${{ inputs.app }}/build.sh" \
            "${{ needs.check-version.outputs.version }}" \
            "${{ matrix.arch }}"

      - name: Update project.yaml version
        run: |
          PROJECT_DIR="${{ needs.check-version.outputs.project_dir }}"
          PROJECT_VERSION="${{ needs.check-version.outputs.project_version }}"
          YAML="$PROJECT_DIR/project.yaml"
          # In-place replace the `version:` line only — every other field
          # (parameters, permissions, i18n, etc.) is left untouched.
          sed -i -E "s/^version:.*/version: ${PROJECT_VERSION}/" "$YAML"
          grep '^version:' "$YAML"

      - name: ugcli check
        run: |
          cd "${{ needs.check-version.outputs.project_dir }}"
          ugcli check

      - name: ugcli pack
        id: pack
        run: |
          PROJECT_DIR="${{ needs.check-version.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          ugcli pack --arch "${{ matrix.arch }}" --build "${{ needs.check-version.outputs.build_num }}"
          UPK_REL=$(find build_dir/pkgs/upk -name '*.upk' | head -1)
          [ -n "$UPK_REL" ] || { echo "::error::no upk produced"; exit 1; }
          # Path must be repo-root-relative (not relative to this step's own
          # cd) — the "Upload artifact" step below is a separate run: block
          # that starts back at the repo root by default.
          UPK_PATH="$PROJECT_DIR/$UPK_REL"
          echo "upk_path=$UPK_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$UPK_REL"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: upk-${{ inputs.app }}-${{ matrix.arch }}
          path: ${{ steps.pack.outputs.upk_path }}
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: upk-${{ inputs.app }}-*
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ needs.check-version.outputs.release_tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"
          TITLE="${{ needs.check-version.outputs.release_title }} ${VERSION} for UGOS Pro"

          if [[ "$RELEASE_TAG" == *-r* ]]; then
            REVISION_NOTE="

          - **打包修订**: ${RELEASE_TAG##*-}
          - 如果当前安装的版本运行正常，无需更新此修订版；需先卸载再重新安装。"
          else
            REVISION_NOTE=""
          fi

          NOTES="上游版本: ${VERSION}
          ugcli build 号: ${{ needs.check-version.outputs.build_num }}
          ${REVISION_NOTE}

          手动安装：应用中心 → 手动安装 → 选择对应架构的 .upk 文件（需要先获得绿联开发者授权 ugdev.sig）。"

          gh release create "$RELEASE_TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            artifacts/upk-${{ inputs.app }}-*/*.upk

      - name: Cleanup old revisions and versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ inputs.app }}"
          VERSION="${{ needs.check-version.outputs.version }}"
          RELEASE_TAG="${{ needs.check-version.outputs.release_tag }}"
          MAX_VERSIONS=5
          BASE_TAG="${APP}/v${VERSION}"

          # Delete other revisions of the exact same version (keep only the
          # one just published).
          OLD_REV_TAGS=$(gh release list --limit 1000 --json tagName \
            | jq -r --arg base "$BASE_TAG" --arg current "$RELEASE_TAG" \
              '.[] | .tagName | select((. == $base or (startswith($base + "-r"))) and . != $current)')
          for tag in $OLD_REV_TAGS; do
            echo "Deleting superseded revision: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done

          # Keep only the most recent MAX_VERSIONS distinct upstream
          # versions (grouping -rN revisions under their base version).
          TAGS_TO_DELETE=$(gh release list --limit 1000 --json tagName,publishedAt \
            | jq -r --arg prefix "${APP}/v" --argjson max "$MAX_VERSIONS" '
              [.[] | select(.tagName | startswith($prefix))]
              | map(. + {base_version: (.tagName | sub("-r[0-9]+$"; ""))})
              | group_by(.base_version)
              | map({latest: (map(.publishedAt) | sort | last), tags: map(.tagName)})
              | sort_by(.latest) | reverse
              | .[$max:]
              | map(.tags[]) | .[]
            ')
          for tag in $TAGS_TO_DELETE; do
            echo "Deleting old version: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
